<!DOCTYPE html>
<html>
<head>
    <title>My Modern Task Tracker</title>
    <style>
        /* This is the "Skin" (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }

        h1 { color: #333; text-align: center; }

        input {
            width: 70%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #27ae60; }

        ul { list-style: none; padding: 0; margin-top: 20px; }

        li {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
.delete-btn { background: #e74c3c; padding: 2px 8px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Tasks</h1>
        
        <input type="text" id="taskInput" placeholder="What needs doing?">
        <button onclick="addTask()">Add</button>

        <ul id="taskList">
            </ul>
    </div>

<script type="module">
  // 1. IMPORT (Only once!)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 2. CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyB8BsxVjjp9P6OGZlvgzLBlHQzZV2PLbqo",
    authDomain: "my-tracker-app-4d895.firebaseapp.com",
    projectId: "my-tracker-app-4d895",
    storageBucket: "my-tracker-app-4d895.firebasestorage.app",
    messagingSenderId: "491846947470",
    appId: "1:491846947470:web:c4ca892f40879d76d02fdf",
    measurementId: "G-2BEDHY0Z26"
  };

const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 2. ATTACH TO WINDOW SO THE BUTTON SEES IT
  window.addTask = async function() {
      const input = document.getElementById("taskInput");
      if (input.value.trim() === "") return;

      try {
          const docRef = await addDoc(collection(db, "tasks"), {
              text: input.value,
              completed: false,
              createdAt: new Date().toLocaleString()
          });
          renderTask(input.value, docRef.id, false);
          input.value = "";
      } catch (e) {
          console.error("Error: ", e);
      }
  };

  // 3. ATTACH DELETE TO WINDOW TOO
  window.deleteTask = async function(id) {
      await deleteDoc(doc(db, "tasks", id));
      document.getElementById(id).remove();
  };

  // 4. ATTACH TOGGLE TO WINDOW TOO
  window.toggleTask = async function(id, currentStatus) {
      const taskRef = doc(db, "tasks", id);
      await updateDoc(taskRef, {
          completed: !currentStatus
      });
      location.reload(); // Temporary way to show the change
  };

  // 5. LOADING AND RENDERING (Internal functions don't need window.)
  window.onload = async function() {
      const q = query(collection(db, "tasks"));
      const querySnapshot = await getDocs(q);
      querySnapshot.forEach((document) => {
          renderTask(document.data().text, document.id, document.data().completed);
      });
  };

  function renderTask(text, id, completed) {
      const list = document.getElementById("taskList");
      const listItem = document.createElement("li");
      listItem.id = id;
      const textStyle = completed ? "text-decoration: line-through; color: gray;" : "";

      listItem.innerHTML = `
          <div style="display: flex; align-items: center;">
              <input type="checkbox" ${completed ? "checked" : ""} onclick="toggleTask('${id}', ${completed})">
              <span style="margin-left: 10px; ${textStyle}">${text}</span>
          </div>
          <button class="delete-btn" onclick="deleteTask('${id}')">X</button>
      `;
      list.appendChild(listItem);
  }
</script> 

</body>
</html>
